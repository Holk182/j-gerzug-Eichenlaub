<!DOCTYPE html> 
<html lang="de"> 
<head> 
  <meta charset="UTF-8"> 
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> 
  <title>Wilkommen</title> 
  <style> 
    body { 
      font-family: Arial, sans-serif; 
      background-color: #f4f4f9; 
      margin: 0; 
      padding: 0; 
      display: flex; 
      justify-content: center; 
      align-items: center; 
      min-height: 100vh; 
    } 
 
    .container { 
      background-color: #ffffff; 
      padding: 30px; 
      border-radius: 8px; 
      box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1); 
      width: 100%; 
      max-width: 500px; 
      text-align: center; 
    } 
 
    h1 { 
      color: #333333; 
      margin-bottom: 20px; 
    } 
 
    p { 
      color: #666666; 
      font-size: 16px; 
      line-height: 1.5; 
    } 
 
    .links { 
      margin-top: 25px; 
      display: flex; 
      flex-direction: column; 
      gap: 12px; 
    } 
 
    .links a { 
      display: block; 
      padding: 12px; 
      background-color: #007bff; 
      color: white; 
      text-decoration: none; 
      border-radius: 4px; 
      font-weight: bold; 
      transition: background-color 0.2s; 
    } 
 
    .links a:hover { 
      background-color: #0056b3; 
    } 
  </style> 
</head> 
<body> 
 
  <div class="container"> 
    <h1>Willkommen!</h1> 
    <p>Hier findest du alle wichtigen Links und Inhalte direkt auf einen Blick.</p> 
 
    <div class="links"> 
      <a href="https://google.com" target="_blank">Google öffnen</a> 
      <a href="https://github.com" target="_blank">GitHub öffnen</a> 
      <!-- Hier kannst du weitere Links einfügen --> 
    </div> 
  </div> 
 
</body> 
</html>
