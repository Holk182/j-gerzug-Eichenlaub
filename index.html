<!DOCTYPE html> 
<html lang="de"> 
<head> 
    <meta charset="UTF-8"> 
    <meta name="viewport" content="width=device-width, initial-scale=1.0"> 
    <title>Jägerzug Eichenlaub</title> 
    <style> 
        :root { 
            --primary: #1e7032;   /* Zug-Grün */ 
            --accent: #ffd000;    /* Signalfarbe Gelb */ 
            --bg: #121212;        /* Schwarz/Dunkler Hintergrund */ 
            --card-bg: #1e1e1e;   /* Dunkelgrau für Karten */ 
            --text-main: #ffffff; /* Weißer Text */ 
            --text-muted: #b0b0b0;/* Grauer Text */ 
            --input-bg: #2d2d2d;  /* Dunkle Eingabefelder */ 
        } 
 
        * { box-sizing: border-box; } 
 
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background-color: var(--bg); 
            color: var(--text-main); 
            margin: 0; 
            padding: 0; 
            padding-bottom: 70px; 
        } 
 
        header { 
            background-color: #000000; 
            color: var(--text-main); 
            padding: 15px; 
            text-align: center; 
            border-bottom: 4px solid var(--accent); 
            position: sticky; 
            top: 0; 
            z-index: 100; 
        } 
 
        header h1 { margin: 0; font-size: 1.4rem; color: #ffffff; } 
 
        .container { 
            padding: 15px; 
            max-width: 600px; 
            margin: 0 auto; 
        } 
 
        /* Tabs */ 
        input[type="radio"].tab-nav { display: none; } 
        .tab-content { display: none; } 
 
        #tab-news:checked ~ .container #content-news, 
        #tab-calendar:checked ~ .container #content-calendar, 
        #tab-polls:checked ~ .container #content-polls, 
        #tab-members:checked ~ .container #content-members { 
            display: block; 
        } 
 
        nav { 
            position: fixed; 
            bottom: 0; 
            left: 0; 
            width: 100%; 
            background: #000000; 
            display: flex; 
            justify-content: space-around; 
            padding: 5px 0; 
            border-top: 3px solid var(--primary); 
            z-index: 1000; 
        } 
 
        nav label { 
            color: var(--text-muted); 
            font-size: 0.85rem; 
            padding: 10px; 
            text-align: center; 
            flex: 1; 
            cursor: pointer; 
            font-weight: bold; 
        } 
 
        #tab-news:checked ~ nav label[for="tab-news"], 
        #tab-calendar:checked ~ nav label[for="tab-calendar"], 
        #tab-polls:checked ~ nav label[for="tab-polls"], 
        #tab-members:checked ~ nav label[for="tab-members"] { 
            color: var(--accent); 
            border-top: 3px solid var(--accent); 
        } 
 
        .card { 
            background: var(--card-bg); 
            padding: 15px; 
            border-radius: 8px; 
            margin-bottom: 15px; 
            box-shadow: 0 2px 6px rgba(0,0,0,0.4); 
            border-left: 5px solid var(--primary); 
        } 
 
        .card h3 { margin-top: 0; color: #ffffff; } 
 
        input[type="text"], input[type="date"], textarea { 
            width: 100%; 
            padding: 12px; 
            margin: 8px 0; 
            border: 1px solid #444; 
            background-color: var(--input-bg); 
            color: var(--text-main); 
            border-radius: 6px; 
        } 
 
        button { 
            background-color: var(--accent); 
            color: #000000; 
            font-weight: bold; 
            border: none; 
            padding: 12px; 
            width: 100%; 
            border-radius: 6px; 
            cursor: pointer; 
            margin-top: 5px; 
            font-size: 1rem; 
        } 
 
        .btn-delete {  
            background-color: #d90429;  
            color: white;  
            margin-top: 5px;  
            padding: 6px;  
            font-size: 0.8rem;  
        } 
 
        .poll-option { 
            background: #2a2a2a; 
            padding: 12px 15px; 
            margin: 8px 0; 
            border-radius: 6px; 
            cursor: pointer; 
            display: flex; 
            justify-content: space-between; 
            border: 1px solid #333; 
        } 
 
        .poll-option span strong { color: var(--accent); } 
    </style> 
</head> 
<body> 
 
<input type="radio" name="tabs" id="tab-news" class="tab-nav" checked> 
<input type="radio" name="tabs" id="tab-calendar" class="tab-nav"> 
<input type="radio" name="tabs" id="tab-polls" class="tab-nav"> 
<input type="radio" name="tabs" id="tab-members" class="tab-nav"> 
 
<header> 
    <h1>Jägerzug Eichenlaub</h1> 
</header> 
 
<div class="container"> 
     
    <!-- NEWS --> 
    <div id="content-news" class="tab-content"> 
        <h2>Aktuelle News</h2> 
        <div class="card" style="border-left-color: var(--accent);"> 
            <h3 style="color: var(--accent);">News verfassen</h3> 
            <input type="text" id="news-title" placeholder="Titel"> 
            <textarea id="news-text" placeholder="Inhalt der Nachricht..." 
style="height:80px;"></textarea> 
            <button type="button" onclick="addNews()">Veröffentlichen</button> 
        </div> 
        <div id="news-list"></div> 
    </div> 
 
    <!-- KALENDER --> 
    <div id="content-calendar" class="tab-content"> 
        <h2>Termine & Veranstaltungen</h2> 
        <div class="card" style="border-left-color: var(--accent);"> 
            <h3 style="color: var(--accent);">Termin hinzufügen</h3> 
            <input type="text" id="event-title" placeholder="Veranstaltungsname"> 
            <input type="date" id="event-date"> 
            <button type="button" onclick="addEvent()">Termin speichern</button> 
        </div> 
        <div id="calendar-list"></div> 
    </div> 
 
    <!-- UMFRAGEN --> 
    <div id="content-polls" class="tab-content"> 
        <h2>Abstimmungen</h2> 
        <div class="card"> 
            <h3>Neue Umfrage starten</h3> 
            <input type="text" id="poll-question" placeholder="Frage (z.B. Welches Bier?)"> 
            <input type="text" id="poll-opt1" placeholder="Option 1"> 
            <input type="text" id="poll-opt2" placeholder="Option 2"> 
            <button type="button" onclick="addPoll()">Umfrage erstellen</button> 
        </div> 
        <div id="polls-list"></div> 
    </div> 
 
    <!-- MITGLIEDER --> 
    <div id="content-members" class="tab-content"> 
        <h2>Mitglieder & Funktionen</h2> 
        <div class="card" style="border-left-color: var(--accent);"> 
            <h3 style="color: var(--accent);">Mitglied hinzufügen</h3> 
            <input type="text" id="member-name" placeholder="Name (z.B. Max Mustermann)"> 
            <input type="text" id="member-role" placeholder="Funktion (z.B. Zugführer, 
Kassierer)"> 
            <button type="button" onclick="addMember()">Mitglied speichern</button> 
        </div> 
        <div id="members-list"></div> 
    </div> 
 
</div> 
 
<nav> 
    <label for="tab-news">News</label> 
    <label for="tab-calendar">Kalender</label> 
    <label for="tab-polls">Umfragen</label> 
    <label for="tab-members">Mitglieder</label> 
</nav> 
 
<script> 
    // Daten laden 
    let newsData = JSON.parse(localStorage.getItem('eichenlaub_news')) || [ 
        { id: 1, title: 'Willkommen in der App!', text: 'Hier findet ihr ab sofort alle Infos rund um 
den Jägerzug Eichenlaub.' } 
    ]; 
 
    let calendarData = JSON.parse(localStorage.getItem('eichenlaub_cal')) || [ 
        { id: 1, title: 'Zugversammlung', date: '2026-08-15' } 
    ]; 
 
    let pollsData = JSON.parse(localStorage.getItem('eichenlaub_polls')) || [ 
        { id: 1, question: 'Anreise zum Schützenfest', options: [{text: 'Planwagen', votes: 0}, 
{text: 'Zu Fuß', votes: 0}] } 
    ]; 
 
    let membersData = JSON.parse(localStorage.getItem('eichenlaub_members')) || [ 
        { id: 1, name: 'Hans Müller', role: 'Zugführer' }, 
        { id: 2, name: 'Peter Schmidt', role: 'Kassierer' }, 
        { id: 3, name: 'Erich Weber', role: 'Flügelleutnant' } 
    ]; 
 
    // Funktionen zum Anzeigen 
    function renderNews() { 
        const container = document.getElementById('news-list'); 
        if (!container) return; 
        container.innerHTML = ''; 
        newsData.forEach((item, index) => { 
            container.innerHTML += ` 
                <div class="card"> 
                    <h3>${item.title}</h3> 
                    <p style="color: var(--text-muted);">${item.text}</p> 
                    <button class="btn-delete" onclick="deleteNews(${index})">Löschen</button> 
                </div>`; 
        }); 
    } 
 
    function renderCalendar() { 
        const container = document.getElementById('calendar-list'); 
        if (!container) return; 
        container.innerHTML = ''; 
        calendarData.forEach((item, index) => { 
            container.innerHTML += ` 
                <div class="card"> 
                    <h3>${item.title}</h3> 
                    <p><strong>Datum:</strong> <span style="color: 
var(--accent);">${item.date}</span></p> 
                    <button class="btn-delete" onclick="deleteEvent(${index})">Löschen</button> 
                </div>`; 
        }); 
    } 
 
    function renderPolls() { 
        const container = document.getElementById('polls-list'); 
        if (!container) return; 
        container.innerHTML = ''; 
        pollsData.forEach((poll, pIndex) => { 
            let optionsHtml = ''; 
            poll.options.forEach((opt, oIndex) => { 
                optionsHtml += ` 
                    <div class="poll-option" onclick="vote(${pIndex}, ${oIndex})"> 
                        <span>${opt.text}</span> 
                        <span><strong>${opt.votes} Stimmen</strong></span> 
                    </div>`; 
            }); 
            container.innerHTML += `<div 
class="card"><h3>${poll.question}</h3>${optionsHtml}</div>`; 
        }); 
    } 
 
    function renderMembers() { 
        const container = document.getElementById('members-list'); 
        if (!container) return; 
        container.innerHTML = ''; 
        membersData.forEach((member, index) => { 
            container.innerHTML += ` 
                <div class="card" style="display: flex; justify-content: space-between; align-items: 
center;"> 
                    <div> 
                        <h3 style="margin: 0;">${member.name}</h3> 
                        <p style="margin: 4px 0 0 0; color: var(--accent);">${member.role}</p> 
                    </div> 
                    <div style="width: 80px;"> 
                        <button class="btn-delete" 
onclick="deleteMember(${index})">Entfernen</button> 
                    </div> 
                </div>`; 
        }); 
    } 
 
    // Funktionen zum Hinzufügen 
    function addNews() { 
        const title = document.getElementById('news-title').value; 
        const text = document.getElementById('news-text').value; 
        if (!title || !text) return; 
        newsData.unshift({ id: Date.now(), title, text }); 
        localStorage.setItem('eichenlaub_news', JSON.stringify(newsData)); 
        renderNews(); 
        document.getElementById('news-title').value = ''; 
        document.getElementById('news-text').value = ''; 
    } 
 
    function deleteNews(index) { 
        newsData.splice(index, 1); 
        localStorage.setItem('eichenlaub_news', JSON.stringify(newsData)); 
        renderNews(); 
    } 
 
    function addEvent() { 
        const title = document.getElementById('event-title').value; 
        const date = document.getElementById('event-date').value; 
        if (!title || !date) return; 
        calendarData.push({ id: Date.now(), title, date }); 
        localStorage.setItem('eichenlaub_cal', JSON.stringify(calendarData)); 
        renderCalendar(); 
        document.getElementById('event-title').value = ''; 
        document.getElementById('event-date').value = ''; 
    } 
 
    function deleteEvent(index) { 
        calendarData.splice(index, 1); 
        localStorage.setItem('eichenlaub_cal', JSON.stringify(calendarData)); 
        renderCalendar(); 
    } 
 
    function addPoll() { 
        const q = document.getElementById('poll-question').value; 
        const o1 = document.getElementById('poll-opt1').value; 
        const o2 = document.getElementById('poll-opt2').value; 
        if (!q || !o1 || !o2) return; 
        pollsData.unshift({ 
            id: Date.now(), 
            question: q, 
            options: [{ text: o1, votes: 0 }, { text: o2, votes: 0 }] 
        }); 
        localStorage.setItem('eichenlaub_polls', JSON.stringify(pollsData)); 
        renderPolls(); 
        document.getElementById('poll-question').value = ''; 
        document.getElementById('poll-opt1').value = ''; 
        document.getElementById('poll-opt2').value = ''; 
    } 
 
    function vote(pollIndex, optionIndex) { 
        pollsData[pollIndex].options[optionIndex].votes++; 
        localStorage.setItem('eichenlaub_polls', JSON.stringify(pollsData)); 
        renderPolls(); 
    } 
 
    function addMember() { 
        const name = document.getElementById('member-name').value; 
        const role = document.getElementById('member-role').value; 
        if (!name || !role) return; 
        membersData.push({ id: Date.now(), name, role }); 
        localStorage.setItem('eichenlaub_members', JSON.stringify(membersData)); 
        renderMembers(); 
        document.getElementById('member-name').value = ''; 
        document.getElementById('member-role').value = ''; 
    } 
 
    function deleteMember(index) { 
        membersData.splice(index, 1); 
        localStorage.setItem('eichenlaub_members', JSON.stringify(membersData)); 
        renderMembers(); 
    } 
 
    // Beim Aufruf der Seite sofort Inhalte zeichnen 
renderNews(); 
renderCalendar(); 
renderPolls(); 
renderMembers(); 
</script> 
</body> 
</html>
