<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jägerzug Eichenlaub</title>
    <style>
        :root {
            --primary: #1e7032;   /* Zug-Grün */
            --accent: #ffd000;    /* Signalfarbe Gelb */
            --bg: #121212;        /* Schwarz/Dunkler Hintergrund */
            --card-bg: #1e1e1e;   /* Dunkelgrau für Karten */
            --text-main: #ffffff; /* Weißer Text */
            --text-muted: #b0b0b0;/* Grauer Text */
            --input-bg: #2d2d2d;  /* Dunkle Eingabefelder */
        }

        * { box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg);
            color: var(--text-main);
            margin: 0;
            padding: 0;
            padding-bottom: 70px;
        }

        header {
            background-color: #000000;
            color: var(--text-main);
            padding: 15px;
            text-align: center;
            border-bottom: 4px solid var(--accent);
            position: sticky;
            top: 0;
            z-index: 100;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        header h1 { margin: 0; font-size: 1.2rem; color: #ffffff; }

        .btn-auth {
            background: transparent;
            border: 1px solid var(--accent);
            color: var(--accent);
            padding: 5px 10px;
            border-radius: 4px;
            font-size: 0.8rem;
            cursor: pointer;
            width: auto;
            margin: 0;
        }

        .container {
            padding: 15px;
            max-width: 600px;
            margin: 0 auto;
        }

        /* Pure CSS Tabs */
        input[type="radio"].tab-nav { display: none; }
        .tab-content { display: none; }

        #tab-news:checked ~ .container #content-news,
        #tab-calendar:checked ~ .container #content-calendar,
        #tab-polls:checked ~ .container #content-polls,
        #tab-members:checked ~ .container #content-members {
            display: block;
        }

        nav {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            background: #000000;
            display: flex;
            justify-content: space-around;
            padding: 5px 0;
            border-top: 3px solid var(--primary);
            z-index: 1000;
        }

        nav label {
            color: var(--text-muted);
            font-size: 0.85rem;
            padding: 10px;
            text-align: center;
            flex: 1;
            cursor: pointer;
            font-weight: bold;
        }

        #tab-news:checked ~ nav label[for="tab-news"],
        #tab-calendar:checked ~ nav label[for="tab-calendar"],
        #tab-polls:checked ~ nav label[for="tab-polls"],
        #tab-members:checked ~ nav label[for="tab-members"] {
            color: var(--accent);
            border-top: 3px solid var(--accent);
        }

        .card {
            background: var(--card-bg);
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 15px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.4);
            border-left: 5px solid var(--primary);
        }

        .card h3 { margin-top: 0; color: #ffffff; }

        input[type="text"], input[type="date"], textarea {
            width: 100%;
            padding: 12px;
            margin: 8px 0;
            border: 1px solid #444;
            background-color: var(--input-bg);
            color: var(--text-main);
            border-radius: 6px;
        }

        button {
            background-color: var(--accent);
            color: #000000;
            font-weight: bold;
            border: none;
            padding: 12px;
            width: 100%;
            border-radius: 6px;
            cursor: pointer;
            margin-top: 5px;
            font-size: 1rem;
        }

        .btn-delete { 
            background-color: #d90429; 
            color: white; 
            margin-top: 5px; 
            padding: 6px; 
            font-size: 0.8rem; 
        }

        .poll-option {
            background: #2a2a2a;
            padding: 12px 15px;
            margin: 8px 0;
            border-radius: 6px;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            border: 1px solid #333;
        }

        .poll-option span strong { color: var(--accent); }

        /* Für Steuerung der Sichtbarkeit je nach Rolle */
        .admin-only {
            display: none !important;
        }
        body.is-admin .admin-only {
            display: block !important;
        }
        body.is-admin .admin-only-flex {
            display: flex !important;
        }
    </style>

    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
</head>
<body>

<input type="radio" name="tabs" id="tab-news" class="tab-nav" checked>
<input type="radio" name="tabs" id="tab-calendar" class="tab-nav">
<input type="radio" name="tabs" id="tab-polls" class="tab-nav">
<input type="radio" name="tabs" id="tab-members" class="tab-nav">

<header>
    <h1>Jägerzug Eichenlaub</h1>
    <button id="auth-btn" class="btn-auth" onclick="toggleAdmin()">Vorstand Login</button>
</header>

<div class="container">
    
    <!-- NEWS -->
    <div id="content-news" class="tab-content">
        <h2>Aktuelle News</h2>
        <!-- Nur für Vorstand sichtbar -->
        <div class="card admin-only" style="border-left-color: var(--accent);">
            <h3 style="color: var(--accent);">News verfassen</h3>
            <input type="text" id="news-title" placeholder="Titel">
            <textarea id="news-text" placeholder="Inhalt der Nachricht..." style="height:80px;"></textarea>
            <button type="button" onclick="addNews()">Veröffentlichen</button>
        </div>
        <div id="news-list"></div>
    </div>

    <!-- KALENDER -->
    <div id="content-calendar" class="tab-content">
        <h2>Termine & Veranstaltungen</h2>
        <!-- Nur für Vorstand sichtbar -->
        <div class="card admin-only" style="border-left-color: var(--accent);">
            <h3 style="color: var(--accent);">Termin hinzufügen</h3>
            <input type="text" id="event-title" placeholder="Veranstaltungsname">
            <input type="date" id="event-date">
            <button type="button" onclick="addEvent()">Termin speichern</button>
        </div>
        <div id="calendar-list"></div>
    </div>

    <!-- UMFRAGEN -->
    <div id="content-polls" class="tab-content">
        <h2>Abstimmungen</h2>
        <!-- Nur für Vorstand sichtbar -->
        <div class="card admin-only">
            <h3>Neue Umfrage starten</h3>
            <input type="text" id="poll-question" placeholder="Frage (z.B. Welches Bier?)">
            <input type="text" id="poll-opt1" placeholder="Option 1 (Pflicht)">
            <input type="text" id="poll-opt2" placeholder="Option 2 (Pflicht)">
            <input type="text" id="poll-opt3" placeholder="Option 3 (Optional)">
            <input type="text" id="poll-opt4" placeholder="Option 4 (Optional)">
            <button type="button" onclick="addPoll()">Umfrage erstellen</button>
        </div>
        <div id="polls-list"></div>
    </div>

    <!-- MITGLIEDER -->
    <div id="content-members" class="tab-content">
        <h2>Mitglieder & Funktionen</h2>
        <!-- Nur für Vorstand sichtbar -->
        <div class="card admin-only" style="border-left-color: var(--accent);">
            <h3 style="color: var(--accent);">Mitglied hinzufügen</h3>
            <input type="text" id="member-name" placeholder="Name (z.B. Max Mustermann)">
            <input type="text" id="member-role" placeholder="Funktion (z.B. Zugführer, Kassierer)">
            <button type="button" onclick="addMember()">Mitglied speichern</button>
        </div>
        <div id="members-list"></div>
    </div>

</div>

<nav>
    <label for="tab-news">News</label>
    <label for="tab-calendar">Kalender</label>
    <label for="tab-polls">Umfragen</label>
    <label for="tab-members">Mitglieder</label>
</nav>

<script>
    // VORSTANDS-PASSWORT (Hier bei Bedarf anpassen)
    const ADMIN_PASSWORD = "eichenlaub123";

    // Firebase Konfiguration
    const firebaseConfig = {
      apiKey: "AIzaSyBmSrw82UEHADIbkfDH1WNRmSVCF7dkGmg",
      authDomain: "jaegerzug-eichenlaub.firebaseapp.com",
      databaseURL: "https://jaegerzug-eichenlaub-default-rtdb.europe-west1.firebasedatabase.app",
      projectId: "jaegerzug-eichenlaub",
      storageBucket: "jaegerzug-eichenlaub.firebasestorage.app",
      messagingSenderId: "608449667276",
      appId: "1:608449667276:web:badedf62396e71addae269"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    // LOGIN SYSTEM LOGIK
    function checkAdminStatus() {
        const isAdmin = localStorage.getItem('eichenlaub_is_admin') === 'true';
        if (isAdmin) {
            document.body.classList.add('is-admin');
            document.getElementById('auth-btn').innerText = 'Logout';
        } else {
            document.body.classList.remove('is-admin');
            document.getElementById('auth-btn').innerText = 'Vorstand Login';
        }
    }

    function toggleAdmin() {
        const isAdmin = localStorage.getItem('eichenlaub_is_admin') === 'true';
        if (isAdmin) {
            localStorage.setItem('eichenlaub_is_admin', 'false');
            alert('Erfolgreich ausgeloggt.');
            checkAdminStatus();
            location.reload();
        } else {
            const pw = prompt('Bitte Vorstands-Passwort eingeben:');
            if (pw === ADMIN_PASSWORD) {
                localStorage.setItem('eichenlaub_is_admin', 'true');
                alert('Willkommen im Vorstands-Bereich!');
                checkAdminStatus();
                location.reload();
            } else if (pw !== null) {
                alert('Falsches Passwort!');
            }
        }
    }

    // LIVE-SYNCHRONISATION

    // News
    db.ref('news').on('value', (snapshot) => {
        const container = document.getElementById('news-list');
        container.innerHTML = '';
        const data = snapshot.val();
        if (data) {
            Object.keys(data).reverse().forEach(key => {
                const item = data[key];
                container.innerHTML += `
                    <div class="card">
                        <h3>${item.title}</h3>
                        <p style="color: var(--text-muted);">${item.text}</p>
                        <button class="btn-delete admin-only" onclick="deleteNews('${key}')">Löschen</button>
                    </div>`;
            });
        }
    });

    // Kalender
    db.ref('calendar').on('value', (snapshot) => {
        const container = document.getElementById('calendar-list');
        container.innerHTML = '';
        const data = snapshot.val();
        if (data) {
            Object.keys(data).forEach(key => {
                const item = data[key];
                container.innerHTML += `
                    <div class="card">
                        <h3>${item.title}</h3>
                        <p><strong>Datum:</strong> <span style="color: var(--accent);">${item.date}</span></p>
                        <button class="btn-delete admin-only" onclick="deleteEvent('${key}')">Löschen</button>
                    </div>`;
            });
        }
    });

    // Umfragen
    db.ref('polls').on('value', (snapshot) => {
        const container = document.getElementById('polls-list');
        container.innerHTML = '';
        const data = snapshot.val();
        if (data) {
            Object.keys(data).forEach(key => {
                const poll = data[key];
                let optionsHtml = '';
                if(poll.options) {
                    poll.options.forEach((opt, oIndex) => {
                        optionsHtml += `
                            <div class="poll-option" onclick="vote('${key}', ${oIndex}, ${opt.votes || 0})">
                                <span>${opt.text}</span>
                                <span><strong>${opt.votes || 0} Stimmen</strong></span>
                            </div>`;
                    });
                }
                container.innerHTML += `
                    <div class="card">
                        <h3>${poll.question}</h3>
                        ${optionsHtml}
                        <button class="btn-delete admin-only" onclick="deletePoll('${key}')" style="margin-top:10px;">Umfrage löschen</button>
                    </div>`;
            });
        }
    });

    // Mitglieder
    db.ref('members').on('value', (snapshot) => {
        const container = document.getElementById('members-list');
        container.innerHTML = '';
        const data = snapshot.val();
        if (data) {
            Object.keys(data).forEach(key => {
                const member = data[key];
                container.innerHTML += `
                    <div class="card" style="display: flex; justify-content: space-between; align-items: center;">
                        <div>
                            <h3 style="margin: 0;">${member.name}</h3>
                            <p style="margin: 4px 0 0 0; color: var(--accent);">${member.role}</p>
                        </div>
                        <div class="admin-only" style="width: 80px;">
                            <button class="btn-delete" onclick="deleteMember('${key}')">Entfernen</button>
                        </div>
                    </div>`;
            });
        }
    });

    // SCHREIB-FUNKTIONEN

    function addNews() {
        const title = document.getElementById('news-title').value;
        const text = document.getElementById('news-text').value;
        if (!title || !text) return;

        db.ref('news').push({ title, text, timestamp: Date.now() });
        document.getElementById('news-title').value = '';
        document.getElementById('news-text').value = '';
    }

    function deleteNews(key) {
        db.ref('news/' + key).remove();
    }

    function addEvent() {
        const title = document.getElementById('event-title').value;
        const date = document.getElementById('event-date').value;
        if (!title || !date) return;

        db.ref('calendar').push({ title, date });
        document.getElementById('event-title').value = '';
        document.getElementById('event-date').value = '';
    }

    function deleteEvent(key) {
        db.ref('calendar/' + key).remove();
    }

    function addPoll() {
        const q = document.getElementById('poll-question').value;
        const o1 = document.getElementById('poll-opt1').value;
        const o2 = document.getElementById('poll-opt2').value;
        const o3 = document.getElementById('poll-opt3').value;
        const o4 = document.getElementById('poll-opt4').value;

        if (!q || !o1 || !o2) return;

        let options = [
            { text: o1, votes: 0 },
            { text: o2, votes: 0 }
        ];

        if (o3.trim() !== '') options.push({ text: o3, votes: 0 });
        if (o4.trim() !== '') options.push({ text: o4, votes: 0 });

        db.ref('polls').push({
            question: q,
            options: options
        });

        document.getElementById('poll-question').value = '';
        document.getElementById('poll-opt1').value = '';
        document.getElementById('poll-opt2').value = '';
        document.getElementById('poll-opt3').value = '';
        document.getElementById('poll-opt4').value = '';
    }

    function vote(pollKey, optionIndex, currentVotes) {
        db.ref(`polls/${pollKey}/options/${optionIndex}/votes`).set(currentVotes + 1);
    }

    function deletePoll(key) {
        db.ref('polls/' + key).remove();
    }

    function addMember() {
        const name = document.getElementById('member-name').value;
        const role = document.getElementById('member-role').value;
        if (!name || !role) return;

        db.ref('members').push({ name, role });
        document.getElementById('member-name').value = '';
        document.getElementById('member-role').value = '';
    }

    function deleteMember(key) {
        db.ref('members/' + key).remove();
    }

    // Beim Laden prüfen, ob Vorstand eingeloggt ist
    window.onload = function() {
        checkAdminStatus();
    };
</script>

</body>
</html>
